name: Test EC2 Connection

on:
  push:
    branches:
      - main  # Ya jis branch par aap test karna chahein
  workflow_dispatch: # Isse aap GitHub UI se manually bhi run kar sakte hain

jobs:
  check-connection:
    runs-on: ubuntu-latest

    steps:
    - name: SSH into EC2 and Test
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          echo "Success! GitHub Actions successfully connected to EC2 Instance."
          uname -a
